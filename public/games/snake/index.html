<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #0f172a;
      color: white;
      font-family: sans-serif;
    }
    canvas {
      background-color: #1e293b;
      border: 4px solid #10b981;
      border-radius: 8px;
    }
    #score {
      font-size: 24px;
      margin-bottom: 16px;
      font-weight: bold;
      color: #10b981;
    }
    .controls {
      margin-top: 16px;
      text-align: center;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="controls">Use Arrow Keys to move</div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const gridSize = 20;
    let snake = [{ x: 200, y: 200 }];
    let apple = { x: 100, y: 100 };
    let dx = 0;
    let dy = -gridSize;
    let score = 0;
    let gameLoop;

    function randomApple() {
      apple.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
      apple.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw Apple
      ctx.fillStyle = "#ef4444";
      ctx.fillRect(apple.x, apple.y, gridSize - 2, gridSize - 2);

      // Draw Snake
      ctx.fillStyle = "#10b981";
      snake.forEach((part, index) => {
        ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
      });

      // Move snake
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      
      // Wall collision
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
        return gameOver();
      }
      
      // Self collision
      if (snake.some(part => part.x === head.x && part.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      if (head.x === apple.x && head.y === apple.y) {
        score += 10;
        document.getElementById("score").innerText = "Score: " + score;
        randomApple();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      clearInterval(gameLoop);
      ctx.fillStyle = "white";
      ctx.font = "30px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2);
      ctx.font = "16px sans-serif";
      ctx.fillText("Press Space to restart", canvas.width / 2, canvas.height / 2 + 30);
    }

    function resetGame() {
      snake = [{ x: 200, y: 200 }];
      dx = 0;
      dy = -gridSize;
      score = 0;
      document.getElementById("score").innerText = "Score: " + score;
      randomApple();
      if(gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(draw, 100);
    }

    document.addEventListener("keydown", e => {
      if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -gridSize; }
      if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = gridSize; }
      if (e.key === 'ArrowLeft' && dx === 0) { dx = -gridSize; dy = 0; }
      if (e.key === 'ArrowRight' && dx === 0) { dx = gridSize; dy = 0; }
      if (e.key === ' ' && !gameLoop) resetGame();
      if (e.key === ' ' && snake.length > 0) {
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };
        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(part => part.x === head.x && part.y === head.y)) {
            resetGame();
        }
      }
    });

    resetGame();
  </script>
</body>
</html>

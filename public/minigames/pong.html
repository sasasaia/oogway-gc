<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #111; overflow: hidden; font-family: sans-serif; }
        canvas { background-color: #000; border: 2px solid #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
        #ui { position: absolute; top: 10px; width: 600px; display: flex; justify-content: space-between; color: white; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score1">0</div>
        <div>Pong</div>
        <div id="score2">0</div>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score1 = 0, score2 = 0;
        const paddleWidth = 10, paddleHeight = 80;
        const ballSize = 10;
        
        const player = { x: 10, y: canvas.height/2 - paddleHeight/2, dy: 0 };
        const computer = { x: canvas.width - 20, y: canvas.height/2 - paddleHeight/2, dy: 3 };
        let ball = { x: canvas.width/2, y: canvas.height/2, dx: 5 * (Math.random() > 0.5 ? 1 : -1), dy: 5 * (Math.random() > 0.5 ? 1 : -1) };

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp") player.dy = -7;
            else if (e.key === "ArrowDown") player.dy = 7;
        });

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") player.dy = 0;
        });

        function resetBall() {
            ball.x = canvas.width/2;
            ball.y = canvas.height/2;
            ball.dx = -ball.dx;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Center line
            ctx.setLineDash([10, 15]);
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.strokeStyle = '#555';
            ctx.stroke();

            // Player paddle
            player.y += player.dy;
            player.y = Math.max(0, Math.min(canvas.height - paddleHeight, player.y));
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(player.x, player.y, paddleWidth, paddleHeight);

            // Computer paddle (AI)
            const aiSpeed = 4;
            if (ball.y < computer.y + paddleHeight/2) computer.y -= aiSpeed;
            else if (ball.y > computer.y + paddleHeight/2) computer.y += aiSpeed;
            computer.y = Math.max(0, Math.min(canvas.height - paddleHeight, computer.y));
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(computer.x, computer.y, paddleWidth, paddleHeight);

            // Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision
            if (ball.y <= 0 || ball.y + ballSize >= canvas.height) ball.dy *= -1;

            // Paddle collision
            if (
                (ball.x <= player.x + paddleWidth && ball.y + ballSize >= player.y && ball.y <= player.y + paddleHeight) ||
                (ball.x + ballSize >= computer.x && ball.y + ballSize >= computer.y && ball.y <= computer.y + paddleHeight)
            ) {
                ball.dx *= -1.05; // Increase speed
            }

            // Score check
            if (ball.x < 0) { score2++; resetBall(); document.getElementById('score2').innerText = score2; }
            if (ball.x > canvas.width) { score1++; resetBall(); document.getElementById('score1').innerText = score1; }

            ctx.fillStyle = '#fff';
            ctx.fillRect(ball.x, ball.y, ballSize, ballSize);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>

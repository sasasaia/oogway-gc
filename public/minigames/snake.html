<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #111; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { background-color: #000; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        #game-over { display: none; position: absolute; text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        button { margin-top: 10px; padding: 8px 16px; background: #22c55e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #16a34a; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="game-over">
        <h2>Game Over</h2>
        <p>Score: <span id="score">0</span></p>
        <button onclick="resetGame()">Play Again</button>
    </div>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const boxSize = 20;
        let snake = [{ x: 200, y: 200 }];
        let food = { x: Math.floor(Math.random() * 20) * boxSize, y: Math.floor(Math.random() * 20) * boxSize };
        let dx = boxSize, dy = 0;
        let score = 0;
        let gameLoop;
        let isGameOver = false;

        document.addEventListener("keydown", changeDirection);

        function changeDirection(e) {
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -boxSize; }
            else if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = boxSize; }
            else if (e.key === "ArrowLeft" && dx === 0) { dx = -boxSize; dy = 0; }
            else if (e.key === "ArrowRight" && dx === 0) { dx = boxSize; dy = 0; }
        }

        function drawGame() {
            if (isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw food
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x, food.y, boxSize, boxSize);

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                food = { x: Math.floor(Math.random() * 20) * boxSize, y: Math.floor(Math.random() * 20) * boxSize };
            } else {
                snake.pop();
            }

            // Draw snake
            ctx.fillStyle = "#22c55e";
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#4ade80" : "#22c55e";
                ctx.fillRect(part.x, part.y, boxSize - 1, boxSize - 1);
            });

            // Check collision
            if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height || 
                snake.slice(1).some(part => head.x === part.x && head.y === part.y)) {
                
                isGameOver = true;
                document.getElementById('score').innerText = score;
                document.getElementById('game-over').style.display = 'block';
                return;
            }

            gameLoop = setTimeout(drawGame, 100);
        }

        window.resetGame = function() {
            snake = [{ x: 200, y: 200 }];
            dx = boxSize; dy = 0;
            score = 0;
            isGameOver = false;
            document.getElementById('game-over').style.display = 'none';
            drawGame();
        };

        drawGame();
    </script>
</body>
</html>
